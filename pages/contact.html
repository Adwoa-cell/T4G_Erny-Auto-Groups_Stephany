<!DOCTYPE html>

</head>
<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <img src="../images/other erny.jpg" alt="Logo" class="logo-img-circle">
    <h2 class="logo-text">ERNY AUTO GROUP</h2>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="sell.html">Sell</a></li>
      <li><a href="#">Sell</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>

       <li><a href="login.html">Login</a></li>
    </ul>

    <div class="auth">
      <a href="#">Login</a>
      <a href="#">Sign up</a>
    </div>
  </nav>
</header>

<!-- HERO SECTION -->
<section class="hero contact-hero">
  <img src="../images/bmw.jpg" alt="Contact Background" class="hero-bg">
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <h1>Contact Us</h1>
    <p>We’re here to help — reach out to us anytime!</p>
  </div>
</section>

<!-- CONTACT FORM -->
<section class="contact-form-section">
  <div class="container">
    <h2>Get in Touch</h2>
    <form class="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <input type="text" name="phone" placeholder="Phone Number" required>
      <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</section>

<!-- CONTACT INFO -->
<section class="contact-info">
  <div class="container">
    <h2>Our Contact Information</h2>
    <p><strong>Address:</strong> 123 Main Street, Accra, Ghana</p>
    <p><strong>Email:</strong> info@ernyautogroup.com</p>
    <p><strong>Phone:</strong> +233 530 219 886</p>
  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
