<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Car - Any Auto Group</title>
<link rel="stylesheet" href="../src/style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar navbar-small">
    <img src="../images/other erny.jpg" alt="Logo" class="logo-img-circle">
    <h2 class="logo-text">ERNY AUTO GROUP</h2>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="buy.html">Buy</a></li>
      <li><a href="sell.html">Sell</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <div class="auth">
      <a href="login.html">Login</a>
      <a href="#">Sign up</a>
    </div>
  </nav>
</header>

<!-- BOOKING FORM SECTION -->
<section class="booking-section-dark">
  <div class="booking-container-dark">
    <img src="images/logo-square.png" alt="Logo" class="booking-logo">
    <h2>Book Your Car</h2>
    <form class="booking-form-dark">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="text" name="car" placeholder="Car Model" required>
      <input type="date" name="date" required>
      <input type="time" name="time" required>
      <button type="submit">Book Now</button>
    </form>
    <p class="booking-note-dark">We will contact you to confirm your booking</p>
  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
