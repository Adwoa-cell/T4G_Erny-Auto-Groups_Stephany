<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Cars - Any Auto Group</title>
<link rel="stylesheet" href="../src/style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <img src="../images/other erny.jpg" alt="Logo" class="logo-img-circle">
    <h2 class="logo-text">ERNY AUTO GROUP</h2>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="buy.html">Buy</a></li>
      <li><a href="sell.html">Sell</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
       <li><a href="login.html">Login</a></li>
    </ul>

    <div class="auth">
      <a href="#">Login</a>
      <a href="#">Sign up</a>
    </div>
  </nav>
</header>

<!-- PAGE TITLE -->
<section class="buy-title">
  <img src="../images/other erny.jpg" alt="Logo" class="buy-logo">
  <h1>Find Your Perfect Car</h1>
  <p>Browse our modern selection of vehicles</p>
</section>

<!-- FILTERS -->
<section class="buy-filters">
  <select>
    <option value="">Make</option>
    <option>Toyota</option>
    <option>Honda</option>
    <option>BMW</option>
    <option>Mercedes</option>
  </select>
  <select>
    <option value="">Model</option>
    <option>Corolla</option>
    <option>Civic</option>
    <option>X5</option>
    <option>C-Class</option>
  </select>
  <select>
    <option value="">Year</option>
    <option>2025</option>
    <option>2024</option>
    <option>2023</option>
    <option>2022</option>
  </select>
</section>

<!-- BUY CAR GRID -->
<section class="buy-cars">
  <div class="container">
    <div class="cars-grid">
      <div class="car-card">
        <div class="car-img-wrapper">
          <img src="../images/2025-mercedes-amg-s63-e-performance-101-67d450db7d124.jpeg" alt="Toyota Corolla">
          <div class="car-overlay">
            <p class="car-price">$20,000</p>
          </div>
        </div>
        <h3>Toyota Corolla</h3>
      </div>
      <div class="car-card">
        <div class="car-img-wrapper">
          <img src="../images/blue car.jpg" alt="Honda Civic">
          <div class="car-overlay">
            <p class="car-price">$22,500</p>
          </div>
        </div>
        <h3>Honda Civic</h3>
      </div>
      <div class="car-card">
        <div class="car-img-wrapper">
          <img src="../images/bmw.jpg" alt="BMW X5">
          <div class="car-overlay">
            <p class="car-price">$55,000</p>
          </div>
        </div>
        <h3>BMW X5</h3>
      </div>
      <div class="car-card">
        <div class="car-img-wrapper">
          <img src="../images/cadillac.jpg" alt="Mercedes C-Class">
          <div class="car-overlay">
            <p class="car-price">$48,000</p>
          </div>
        </div>
        <h3>Mercedes C-Class</h3>
      </div>
      <div class="car-card">
        <div class="car-img-wrapper">
          <img src="../images/car photo.jpg" alt="Audi A4">
          <div class="car-overlay">
            <p class="car-price">$50,000</p>
          </div>
        </div>
        <h3>Audi A4</h3>
      </div>
      <!-- Add more cards as needed -->
    </div>
  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
